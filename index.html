<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gra</title>
</head>
<body>
    <canvas id="myCanvas" width="600" height="600" style="border:1px solid #000000;"></canvas>
    <script>

        const canvas = document.querySelector("canvas");
        const ctx = canvas.getContext("2d");
        
        const Rozmiar = 60;

        const PrawaGranica = 9;
        const DolnaGranica = 9;
        const LewaGranica = 0;
        const GornaGranica = 0;

        const Gora= "gora";
        const Dol = "dol";
        const Lewo = "lewo";
        const Prawo = "prawo";

        var x,y;
        var OwocX,OwocY;

        var Kierunek = Prawo;
        var Szybkosc = 500;
        setInterval(rysuj, Szybkosc);

        let Waz = [{x: 4, y: 4}, {x: 3, y: 4}, {x: 2, y: 4}];

        let Owoce = [];     

        function rysuj() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);        
            ctx.beginPath();

            for (let i = 0; i < Waz.length; i++) {
                const Kawalek = Waz[i];
                ctx.fillRect(Kawalek.x * Rozmiar, Kawalek.y * Rozmiar, Rozmiar, Rozmiar);
                ctx.strokeRect(Kawalek.x * Rozmiar, Kawalek.y * Rozmiar, Rozmiar, Rozmiar);
            }          

            ctx.lineTo(x + Rozmiar, y);
            ctx.lineTo(x + Rozmiar, y + Rozmiar);
            ctx.lineTo(x, y + Rozmiar);
            ctx.closePath();
            ctx.fillRect(x, y, Rozmiar, Rozmiar);
            ctx.stroke();

//---------------------------granice------------------------------

            if (Kierunek === Prawo) {
                Waz.unshift({x: Waz[0].x + 1, y: Waz[0].y});
                Waz.pop();
            

            if (Waz[0].x >= PrawaGranica) {
                Kierunek = Waz[0].y === GornaGranica ? Dol : Gora;
            }}

//----------------------------------------------------------------

            if (Kierunek === Lewo) {
                Waz.unshift({x: Waz[0].x - 1, y: Waz[0].y});
                Waz.pop();
            

            if (Waz[0].x === LewaGranica) {
                Kierunek = Waz[0].y === GornaGranica ? Dol : Gora;
            }}
           
//----------------------------------------------------------------

            if (Kierunek === Gora) {
                Waz.unshift({x: Waz[0].x, y: Waz[0].y - 1});
                Waz.pop();
            

            if (Waz[0].y === GornaGranica) {
                Kierunek = Waz[0].x === LewaGranica ? Prawo : Lewo;
            }}
//----------------------------------------------------------------

            if (Kierunek === Dol) {
                Waz.unshift({x: Waz[0].x, y: Waz[0].y + 1});
                Waz.pop();
            

            if (Waz[0].y === DolnaGranica) {
                Kierunek = Waz[0].x === PrawaGranica ? Lewo : Prawo;
            }}

//--------------------------sterowanie----------------------------

        const kierunki  = {
        ArrowUp:    { k: Gora,    opp: Dol  },
        ArrowDown:  { k: Dol,  opp: Gora    },
        ArrowLeft:  { k: Lewo,  opp: Prawo },
        ArrowRight: { k: Prawo, opp: Lewo  },
        };

        document.addEventListener("keydown", function(event) {
        const d = kierunki[event.key];
        if (d && Kierunek !== d.opp) Kierunek = d.k;
        });
        
 //--------------------------owoce-------------------------------
            
            if (Owoce.length === 0) {
            OwocX = Math.floor(Math.random() * 10) * Rozmiar;
            OwocY = Math.floor(Math.random() * 10) * Rozmiar;
                Owoce.push({x: OwocX, y: OwocY});
            }

            ctx.beginPath();
            ctx.arc(Owoce[0].x + Rozmiar / 2, Owoce[0].y + Rozmiar / 2, Rozmiar / 2, 0, Math.PI * 2);
            ctx.stroke();              
               
            if (Waz[0].x === Owoce[0].x / Rozmiar && Waz[0].y === Owoce[0].y / Rozmiar) {
                Waz.push({x: Waz[Waz.length - 1].x, y: Waz[Waz.length - 1].y});
                Owoce.shift();
            }
        
//--------------------------kolizja-------------------------------

            for (let i = Waz.length - 1; i > 0; i--) {
                if (Waz[0].x === Waz[i].x && Waz[0].y === Waz[i].y) {
                    alert("Koniec gry! \n Twój wynik: " + (Waz.length - 3));
                    Waz = [{x: 4, y: 4}, {x: 3, y: 4}, {x: 2, y: 4}];
                    Kierunek = Prawo;
                    Owoce = [];
                }
            }

//----------------------------wynik-------------------------------

            ctx.font = "20px Arial";
            ctx.fillText("Wynik: " + (Waz.length - 3), (PrawaGranica * Rozmiar) - Rozmiar * 2, 1 * Rozmiar);

            if (Waz.length - 3 === 100) {
                alert("Wygrałeś!!!");
            }   
    }
    
    </script>
</body>
</html>
